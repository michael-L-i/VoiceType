# Release candidate check — build the DMG + signed Sparkle ZIP/appcast on a
# GitHub runner, verify the package closure, and retain the artifacts briefly.
#
# MANUAL ONLY (workflow_dispatch). This is deliberately NOT a publishing path:
# GitHub runners do not have the maintainer's Developer ID certificate or Apple
# notary credentials, so the DMG is ad-hoc signed and must never be shared as a
# public release. Canonical releases are cut locally with Scripts/release.sh and
# published only after its Developer ID + notarization checks pass.
#
# REQUIRED SECRET: SPARKLE_PRIVATE_KEY — the EdDSA private key that signs updates
# (export it once with Sparkle's `generate_keys -x`). Without it the appcast
# can't be signed and the run fails at the signing step. The matching public key
# is pinned in Info.plist as SUPublicEDKey; the private key is NEVER committed.
name: Release candidate check

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, without the leading v (e.g. 1.0.1)"
        required: true

permissions:
  contents: read

jobs:
  package-check:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build DMG + signed Sparkle update
        env:
          ALLOW_NON_MAIN_RELEASE: "1"
          ALLOW_UNNOTARIZED_RELEASE: "1"
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: ./Scripts/release.sh "${{ inputs.version }}"

      - name: Retain unnotarized artifacts for inspection
        uses: actions/upload-artifact@v4
        with:
          name: "UNNOTARIZED-VoiceType-${{ inputs.version }}"
          retention-days: 3
          if-no-files-found: error
          path: |
            VoiceType.dmg
            VoiceType.zip
            appcast.xml
